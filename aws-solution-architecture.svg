  <path d="M738 474C820 432 954 406 1174 374" stroke="#0F9F8F" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="8 10" marker-end="url(#arrowTeal)"/>
  <path d="M1174 370C1064 394 978 428 902 474" stroke="#0F9F8F" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="8 10" marker-end="url(#arrowTeal)"/>
