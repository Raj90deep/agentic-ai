  <path d="M938 404V448H738V474" stroke="#0F9F8F" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowTeal)"/>
  <path d="M1328 414V448H1388V486" stroke="#0F9F8F" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowTeal)"/>

  <path d="M462 569H536" stroke="#175CD3" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <path d="M940 569H1014" stroke="#175CD3" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
