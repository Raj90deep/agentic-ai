<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Architecture Diagram</title>
    <style>
      :root {
        color-scheme: light;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(23, 92, 211, 0.12), transparent 22%),
          radial-gradient(circle at 85% 12%, rgba(15, 159, 143, 0.1), transparent 18%),
          linear-gradient(180deg, #f8fbff 0%, #f2f7ff 100%);
        font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .frame {
        width: min(100%, 1600px);
        padding: 16px;
        border: 1px solid rgba(19, 35, 62, 0.08);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.7);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(20px);
      }

      img {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <img src="./business-architecture-diagram.svg" alt="Business architecture diagram" />
    </main>
  </body>
</html>
